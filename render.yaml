services:
  - type: worker
    name: trading-agents-automation
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # or your preferred plan
    envVars:
      - key: ZHIPUAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LLM_PROVIDER
        value: z.ai
      - key: LLM_MODEL
        value: glm3.7
      - key: PYTHONPATH
        value: "/"
