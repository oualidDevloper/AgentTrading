name: Trading Agents - Daily Analysis

on:
  schedule:
    - cron: "35 13 * * 1-5"  # 13:35 UTC = 9:35 AM EST, Mon-Fri (Adjusted for market open)
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-trading-analysis:
    runs-on: ubuntu-latest
    environment: AgentTrading
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trading Analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: google
          LLM_MODEL: gemini-2.0-flash
          DEEP_LLM_MODEL: gemini-2.0-flash
          PYTHONPATH: ${{ github.workspace }}
        run: python -c "from tradingagents.automation.automate import run_daily_automation; run_daily_automation()"
